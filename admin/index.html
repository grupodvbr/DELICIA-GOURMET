<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Admin • Sistema SaaS</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#020617;
  --card:#0f172a;
  --accent:#22c55e;
  --danger:#ef4444;
}

body{
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:#fff;
}

header{
  padding:20px;
  font-size:22px;
  font-weight:800;
}

.container{
  padding:20px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:16px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:#020617;
  color:#fff;
}

button{
  margin-top:10px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:var(--accent);
  font-weight:700;
  cursor:pointer;
}

.item{
  padding:12px;
  border-bottom:1px solid #1e293b;
}

.link{
  color:#22c55e;
  font-size:12px;
  word-break:break-all;
}

.btn-copy{
  background:#334155;
  margin-top:5px;
}

</style>
</head>

<body>

<header>👑 Administração do Sistema</header>

<div class="container">

<!-- CADASTRO -->
<div class="card">
  <h3>Nova Empresa</h3>

  <input id="fantasia" placeholder="Nome Fantasia">
  <input id="razao" placeholder="Razão Social">
  <input id="cnpj" placeholder="CNPJ">
  <input id="email" placeholder="Email">
  <input id="senha" placeholder="Senha">
  <input id="logo" placeholder="URL da Logo">

  <button onclick="criarEmpresa()">Criar Empresa</button>
</div>

<!-- LISTA -->
<div class="card">
  <h3>Empresas</h3>
  <div id="lista"></div>
</div>

</div>

<script>

// 🔥 CLIENTE SUPABASE
const client = supabase.createClient(
  "https://mybsriouiwqsdufujbsc.supabase.co",
  "sb_publishable_AUyBEIVCAMUoXwDKUmlqSw_v8EY8rVN"
)

// 🔥 GERAR SLUG BASE
function gerarSlugBase(nome){
  return nome
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9]+/g,"-")
    .replace(/(^-|-$)/g,"")
}

// 🔥 GARANTIR SLUG ÚNICO
async function gerarSlugUnico(nome){

  let base = gerarSlugBase(nome)
  let slug = base
  let contador = 1

  while(true){

    const { data } = await client
      .from("empresas")
      .select("id")
      .eq("slug", slug)
      .maybeSingle()

    if(!data) return slug

    slug = base + "-" + contador
    contador++
  }
}

// 🔥 CRIAR EMPRESA
async function criarEmpresa(){

  const fantasia = document.getElementById("fantasia").value
  const razao = document.getElementById("razao").value
  const cnpj = document.getElementById("cnpj").value
  const email = document.getElementById("email").value
  const senha = document.getElementById("senha").value
  const logo = document.getElementById("logo").value

  if(!fantasia || !cnpj || !senha){
    alert("Preencha os campos obrigatórios")
    return
  }

  const slug = await gerarSlugUnico(fantasia)

  const { error } = await client
    .from("empresas")
    .insert([{
      nome_fantasia: fantasia,
      razao_social: razao,
      cnpj,
      email,
      senha,
      logo_url: logo,
      slug
    }])

  if(error){
    alert("Erro: " + error.message)
    return
  }

  const link = `${location.origin}/empresa/${slug}`

  alert("Empresa criada!\n\nLink:\n" + link)

  limparCampos()
  carregarEmpresas()
}

// 🔥 LIMPAR CAMPOS
function limparCampos(){
  document.getElementById("fantasia").value = ""
  document.getElementById("razao").value = ""
  document.getElementById("cnpj").value = ""
  document.getElementById("email").value = ""
  document.getElementById("senha").value = ""
  document.getElementById("logo").value = ""
}

// 🔥 COPIAR LINK
function copiar(texto){
  navigator.clipboard.writeText(texto)
  alert("Link copiado!")
}

// 🔥 LISTAR EMPRESAS
async function carregarEmpresas(){

  const { data } = await client
    .from("empresas")
    .select("*")
    .order("created_at", { ascending:false })

  const lista = document.getElementById("lista")
  lista.innerHTML = ""

  data.forEach(e => {

    const link = `${location.origin}/empresa/${e.slug}`

    lista.innerHTML += `
      <div class="item">
        <strong>${e.nome_fantasia}</strong><br>

        <div class="link">${link}</div>

        <button class="btn-copy" onclick="copiar('${link}')">
          Copiar Link
        </button>
      </div>
    `
  })
}

// INIT
carregarEmpresas()

</script>

</body>
</html>
