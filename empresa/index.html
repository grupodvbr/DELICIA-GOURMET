<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Empresa</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#020617;
  --card:#0f172a;
  --accent:#22c55e;
  --text:#fff;
  --muted:#94a3b8;
}

body{
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  padding:20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#020617;
  border-bottom:1px solid #1e293b;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:45px;
  height:45px;
  border-radius:12px;
  object-fit:cover;
}

.nome{
  font-weight:700;
  font-size:18px;
}

/* CONTAINER */
.container{
  padding:20px;
}

/* CARD */
.card{
  background:var(--card);
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
}

/* STATUS */
.badge{
  padding:6px 12px;
  border-radius:10px;
  font-size:12px;
  display:inline-block;
}

.ativo{ background:#16a34a }
.inativo{ background:#ef4444 }

/* LOADING */
.loading{
  text-align:center;
  margin-top:100px;
  color:var(--muted);
}
</style>
</head>

<body>

<div id="loading" class="loading">Carregando empresa...</div>

<div id="app" style="display:none">

<header>
  <div class="logo">
    <img id="logo">
    <div>
      <div class="nome" id="nome"></div>
      <small id="segmento"></small>
    </div>
  </div>

  <div id="status"></div>
</header>

<div class="container">

<div class="card">
  <h3>Informações da Empresa</h3>

  <p><strong>CNPJ:</strong> <span id="cnpj"></span></p>
  <p><strong>Email:</strong> <span id="email"></span></p>
  <p><strong>Telefone:</strong> <span id="telefone"></span></p>
  <p><strong>Endereço:</strong> <span id="endereco"></span></p>
</div>

<div class="card">
  <h3>Colaboradores</h3>
  <div id="colaboradores"></div>
</div>

</div>

</div>

<script>

// 🔥 SUPABASE
const client = supabase.createClient(
  "https://mybsriouiwqsdufujbsc.supabase.co",
  "sb_publishable_AUyBEIVCAMUoXwDKUmlqSw_v8EY8rVN"
)

// 🔥 PEGAR SLUG DA URL
const slug = window.location.pathname.split("/").pop()

// 🔥 CARREGAR EMPRESA
async function carregarEmpresa(){

  const { data: empresa } = await client
    .from("empresas")
    .select("*")
    .eq("slug", slug)
    .single()

  if(!empresa){
    document.getElementById("loading").innerText = "Empresa não encontrada"
    return
  }

  // 🔥 PREENCHER DADOS
  document.getElementById("nome").innerText = empresa.nome_fantasia
  document.getElementById("segmento").innerText = empresa.segmento || "-"
  document.getElementById("cnpj").innerText = empresa.cnpj
  document.getElementById("email").innerText = empresa.email || "-"
  document.getElementById("telefone").innerText = empresa.telefone || "-"
  document.getElementById("endereco").innerText = empresa.endereco || "-"

  document.getElementById("logo").src =
    empresa.logo_url || "https://via.placeholder.com/45"

  document.getElementById("status").innerHTML = `
    <span class="badge ${empresa.ativo ? 'ativo':'inativo'}">
      ${empresa.ativo ? 'Ativa':'Inativa'}
    </span>
  `

  document.getElementById("loading").style.display = "none"
  document.getElementById("app").style.display = "block"

  carregarColaboradores(empresa.id)
}

// 🔥 CARREGAR COLABORADORES
async function carregarColaboradores(empresa_id){

  const { data } = await client
    .from("colaboradores")
    .select("*")
    .eq("empresa_id", empresa_id)

  const lista = document.getElementById("colaboradores")
  lista.innerHTML = ""

  if(!data.length){
    lista.innerHTML = "<small>Nenhum colaborador cadastrado</small>"
    return
  }

  data.forEach(c => {

    lista.innerHTML += `
      <div style="padding:10px;border-bottom:1px solid #1e293b">
        <strong>${c.nome}</strong><br>
        <small>${c.cargo || "-"}</small>
      </div>
    `
  })
}

// INIT
carregarEmpresa()

</script>

</body>
</html>
